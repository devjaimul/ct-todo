name: ct_todo
description: "A Flutter Todo app with Firebase, GetX & GoRouter."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  firebase_core: ^3.13.0
  firebase_auth: ^5.5.4
  cloud_firestore: ^5.6.7
  get: ^4.7.2
  go_router: ^15.1.2
  flutter_screenutil: ^5.9.3
  shared_preferences: ^2.5.3
  connectivity_plus: ^6.1.4
  shimmer: ^3.0.0
  fluttertoast: ^8.2.12
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
